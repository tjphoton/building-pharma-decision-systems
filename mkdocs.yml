site_name: Building Pharmaceutical Decision Systems
site_url: https://tjphoton.github.io/building-pharma-decision-systems/
repo_url: https://github.com/tjphoton/building-pharma-decision-systems
docs_dir: docs
site_dir: _site

theme:
  name: material
  palette:
    scheme: default
    primary: blue
    accent: blue
  features:
    - navigation.indexes
    - navigation.top
    # - toc.integrate
    - search.suggest
    - search.highlight

extra:
  analytics:
    provider: google
    property: G-75R972HVF8

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - include-markdown

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - codehilite
  - pymdownx.arithmatex:
      generic: true

nav:
  - Introduction: index.md
  - Chapter 1:
      - A Medicine, a Market, and the Decisions Between Them: ch01_intro/ch01_introduction.md
  - Chapter 2:
      - The Commercialization Operating System: ch02_ecosystem/ch02_ecosystem.md
      - Chapter 2 Appendix: ch02_ecosystem/ch02_appendix.md
  - Chapter 3:
      - A Synthetic Lab for Real Pharma Questions: ch03_data/ch03_data.md
      - "Chapter 3 Appendix: Common Data Sources and Synthetic Data Field Reference": ch03_data/ch03_appendix.md
      - Walkthrough Notebook: ch03_data/chapter3_walkthrough.md
      - Exercise Solutions: ch03_data/exercise_solutions.md
  - Chapter 4:
      - Market Sizing and Patient Populations: ch04_market/ch04_market_sizing.md
      - Walkthrough Notebook: ch04_market/chapter4_walkthrough.md
      - Exercise Solutions: ch04_market/exercise_solutions.md
  - Chapter 5:
      - "Building the Patient Journey: Treatment Patterns, Lines of Therapy, and Persistence": ch05_journey/ch05_patient_journey.md
      - Walkthrough Notebook: ch05_journey/chapter5_walkthrough.md
      - Exercise Solutions: ch05_journey/exercise_solutions.md
  - Chapter 6:
      - "HCP and Account Targeting: From Opportunity to Field Action": ch06_hcp/ch06_hcp_account_targeting.md
      - Walkthrough Notebook: ch06_hcp/chapter6_walkthrough.md
      - Exercise Solutions: ch06_hcp/exercise_solutions.md
  - Chapter 7:
      - "Competitive Intelligence and Market Access": ch07_competitive/ch07_competitive_intelligence_market_access.md
      - Walkthrough Notebook: ch07_competitive/chapter7_walkthrough.md
      - Exercise Solutions: ch07_competitive/exercise_solutions.md
