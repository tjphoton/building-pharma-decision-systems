<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Off-policy evaluation policy replay</title>
  <desc id="desc">A diagram showing logged decisions, candidate policy replay, matched rewards, and off-policy estimators.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f4f4f"/>
    </marker>
    <style>
      .bg { fill: #f7faf7; }
      .panel { fill: #ffffff; stroke: #9bb4aa; stroke-width: 2; rx: 8; }
      .accent { fill: #e4f0ea; stroke: #6f9485; stroke-width: 2; rx: 8; }
      .warn { fill: #fff1d6; stroke: #c28a25; stroke-width: 2; rx: 8; }
      .title { font: 700 28px Georgia, serif; fill: #1d2d2a; }
      .label { font: 700 18px Georgia, serif; fill: #1d2d2a; }
      .text { font: 15px Georgia, serif; fill: #30413d; }
      .small { font: 13px Georgia, serif; fill: #4c5d59; }
      .arrow { stroke: #2f4f4f; stroke-width: 3; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #8aa49a; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="560"/>
  <text class="title" x="54" y="56">Off-policy evaluation replays a candidate NBA policy before deployment</text>
  <text class="text" x="54" y="86">Historical rows provide context, logged action, logging probability, and later response.</text>

  <rect class="panel" x="54" y="128" width="220" height="154"/>
  <text class="label" x="76" y="164">Historical log</text>
  <text class="text" x="76" y="198">Context at decision date</text>
  <text class="text" x="76" y="224">Logged NBA action</text>
  <text class="text" x="76" y="250">Later response</text>

  <rect class="accent" x="336" y="128" width="230" height="154"/>
  <text class="label" x="358" y="164">Candidate policy</text>
  <text class="text" x="358" y="198">Same eligibility gates</text>
  <text class="text" x="358" y="224">Digital-first precedence</text>
  <text class="text" x="358" y="250">Replay on old context</text>

  <rect class="warn" x="628" y="104" width="220" height="104"/>
  <text class="label" x="650" y="140">Matched rows</text>
  <text class="text" x="650" y="172">Candidate action equals</text>
  <text class="text" x="650" y="196">the logged action</text>

  <rect class="panel" x="628" y="242" width="220" height="104"/>
  <text class="label" x="650" y="278">Unmatched rows</text>
  <text class="text" x="650" y="310">No observed reward for</text>
  <text class="text" x="650" y="334">the candidate action</text>

  <rect class="accent" x="902" y="148" width="124" height="160"/>
  <text class="label" x="926" y="184">Policy</text>
  <text class="label" x="920" y="210">value</text>
  <text class="small" x="926" y="246">IPS</text>
  <text class="small" x="926" y="270">SNIPS</text>
  <text class="small" x="926" y="294">DR</text>

  <path class="arrow" d="M274 205 H326"/>
  <path class="arrow" d="M566 190 C596 170 604 156 620 156"/>
  <path class="arrow" d="M566 224 C598 248 604 286 620 296"/>
  <path class="arrow" d="M848 156 H892"/>
  <path class="dash" d="M848 294 C878 282 884 256 894 236"/>

  <rect class="panel" x="188" y="396" width="704" height="92"/>
  <text class="label" x="214" y="432">Decision rule</text>
  <text class="text" x="214" y="464">Use overlap, effective sample size, and estimator agreement to screen the policy.</text>
  <text class="text" x="214" y="488">Use a live randomized test before making the policy the production default.</text>
</svg>
