<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img">
<title>One command builds the data package</title>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#344054"/></marker>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/></filter>
</defs>
<rect width="1600" height="500" fill="#FFFFFF"/>
<text text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="36" font-weight="700" fill="#172033"><tspan x="800.0" y="66.0">One command builds the data package</tspan></text>
<circle cx="230.0" cy="172.0" r="22.0" fill="#4F86A6"/><text x="230.0" y="180.4" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">1</text>
<rect x="65" y="190" width="330" height="190" rx="18" fill="#D8EAF5" stroke="#4F86A6" stroke-width="2.5" filter="url(#shadow)"/>
<text text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="normal" fill="#172033"><tspan x="230.0" y="262.4">Patient count</tspan><tspan x="230.0" y="287.4">Random seed</tspan><tspan x="230.0" y="312.4">Output directory</tspan></text>
<text x="230" y="228" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="19" font-weight="700" fill="#4F86A6">Configure and seed</text>
<path d="M399.0,285.0 L442.0,285.0" fill="none" stroke="#344054" stroke-width="3" marker-end="url(#arrow)"/>
<circle cx="615.0" cy="172.0" r="22.0" fill="#A66E12"/><text x="615.0" y="180.4" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">2</text>
<rect x="450" y="190" width="330" height="190" rx="18" fill="#F8E2A8" stroke="#A66E12" stroke-width="2.5" filter="url(#shadow)"/>
<text text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="normal" fill="#172033"><tspan x="615.0" y="274.9">Patients, HCPs, accounts</tspan><tspan x="615.0" y="299.9">Payers, products, references</tspan></text>
<text x="615" y="228" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="19" font-weight="700" fill="#A66E12">Build shared entities</text>
<path d="M784.0,285.0 L827.0,285.0" fill="none" stroke="#344054" stroke-width="3" marker-end="url(#arrow)"/>
<circle cx="1000.0" cy="172.0" r="22.0" fill="#A44A3F"/><text x="1000.0" y="180.4" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">3</text>
<rect x="835" y="190" width="330" height="190" rx="18" fill="#F6D2CC" stroke="#A44A3F" stroke-width="2.5" filter="url(#shadow)"/>
<text text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="normal" fill="#172033"><tspan x="1000.0" y="274.9">Claims, EHR, access, engagement</tspan><tspan x="1000.0" y="299.9">Lag, duplicates, mapping gaps</tspan></text>
<text x="1000" y="228" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="19" font-weight="700" fill="#A44A3F">Generate records and defects</text>
<path d="M1169.0,285.0 L1212.0,285.0" fill="none" stroke="#344054" stroke-width="3" marker-end="url(#arrow)"/>
<circle cx="1385.0" cy="172.0" r="22.0" fill="#4C7A43"/><text x="1385.0" y="180.4" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">4</text>
<rect x="1220" y="190" width="330" height="190" rx="18" fill="#DCEFD6" stroke="#4C7A43" stroke-width="2.5" filter="url(#shadow)"/>
<text text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="normal" fill="#172033"><tspan x="1385.0" y="262.4">Domain CSV files</tspan><tspan x="1385.0" y="287.4">Manifest and contracts</tspan><tspan x="1385.0" y="312.4">Folder guides</tspan></text>
<text x="1385" y="228" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="19" font-weight="700" fill="#4C7A43">Write the package</text>
</svg>